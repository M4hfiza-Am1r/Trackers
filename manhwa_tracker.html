<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manhwa Tracker</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 0; }

    #lock-screen {
        position: fixed; inset: 0; background: #121212;
        display: flex; align-items: center; justify-content: center;
        z-index: 99999; flex-direction: column; gap: 16px;
    }
    #lock-screen.hidden { display: none; }
    #lock-box {
        background: #1e1e1e; border: 1px solid #333; border-radius: 14px;
        padding: 36px 32px; display: flex; flex-direction: column;
        align-items: center; gap: 14px; width: 300px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.7);
    }
    #lock-box .lock-icon { font-size: 2.2em; }
    #lock-box h2 { margin: 0; font-size: 0.85em; color: #888; text-transform: uppercase; letter-spacing: 2px; }
    #lock-pwd { width: 100%; background: #252525; border: 1px solid #444; color: #e0e0e0; padding: 10px 14px; border-radius: 8px; font-size: 1em; text-align: center; letter-spacing: 2px; }
    #lock-pwd:focus { outline: none; border-color: #76c7c0; }
    #lock-btn { width: 100%; padding: 11px; background: #76c7c0; color: #121212; border: none; border-radius: 8px; font-size: 0.95em; font-weight: 700; cursor: pointer; letter-spacing: 1px; }
    #lock-btn:hover { background: #5db3ac; }
    #lock-error { font-size: 0.8em; color: #c0504d; min-height: 1.2em; }
    #app { display: none; }

    #sync-status { position: fixed; bottom: 16px; right: 16px; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 6px 12px; font-size: 0.75em; color: #666; z-index: 9999; transition: all 0.3s; }
    #sync-status.syncing { color: #76c7c0; border-color: #76c7c0; }
    #sync-status.error   { color: #c0504d; border-color: #c0504d; }
    #sync-status.ok      { color: #4caf50; border-color: #4caf50; }

    header { background-color: #1e1e1e; padding: 10px; }
    .top-container { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 20px; }
    .controls-left, .controls-right { display: flex; flex-direction: column; gap: 10px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    textarea { width: 250px; height: 100px; }
    input, select, button, textarea { padding: 6px; background-color: #333; border: 1px solid #555; color: #fff; border-radius: 4px; }
    .main { padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 10px; border: 1px solid #444; text-align: left; }
    th { background-color: #333; }
    td a { color: #76c7c0; text-decoration: none; }
    td a:hover { text-decoration: underline; }
    .link-item { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
    .fav-checkbox { cursor: pointer; }
    .saving-indicator { font-size: 0.7em; color: #76c7c0; margin-left: 6px; display: none; }
    .saving-indicator.show { display: inline; }
  </style>
</head>
<body>

<!-- Lock screen -->
<div id="lock-screen">
    <div id="lock-box">
        <div class="lock-icon">🔒</div>
        <h2>Manhwa Tracker</h2>
        <input type="password" id="lock-pwd" placeholder="Enter password" onkeydown="if(event.key==='Enter') unlock()">
        <button id="lock-btn" onclick="unlock()">Unlock</button>
        <div id="lock-error"></div>
    </div>
</div>

<!-- App — hidden until unlocked -->
<div id="app">
<div id="sync-status">⏳ Connecting…</div>

<header>
  <div class="top-container">
    <div class="controls-left">
      <div class="row">
        <input type="text" id="search-bar" placeholder="Search...">
        <button id="reset-filters">Reset</button>
        <button id="backup-btn">Backup</button>
        <input type="file" id="restore-file" accept=".json" style="display:none;">
        <button id="restore-btn">Restore</button>
      </div>
      <div class="row">
        <div>
          <div id="origin-checkboxes" style="display:flex;flex-direction:column;max-height:80px;overflow-y:auto;gap:4px;">
            <label style="font-size:12px;display:flex;align-items:center;gap:5px;"><input type="checkbox" class="origin-filter-checkbox" value="K"/> K</label>
            <label style="font-size:12px;display:flex;align-items:center;gap:5px;"><input type="checkbox" class="origin-filter-checkbox" value="C"/> C</label>
            <label style="font-size:12px;display:flex;align-items:center;gap:5px;"><input type="checkbox" class="origin-filter-checkbox" value="J"/> J</label>
          </div>
        </div>
        <div>
          <div id="genre-checkboxes" style="display:flex;flex-direction:column;max-height:120px;overflow-y:auto;gap:4px;"></div>
          <label style="font-size:12px;margin-top:5px;"><input type="checkbox" id="genre-toggle"/> Match all genres (AND)</label>
        </div>
        <datalist id="genre-suggestions"></datalist>
        <select id="status-filter">
          <option value="" selected>All Status</option>
          <option value="Ongoing">Ongoing</option>
          <option value="Completed">Completed</option>
          <option value="Hiatus">Hiatus</option>
          <option value="Plan to Read">Plan to Read</option>
        </select>
        <select id="favorites-filter">
          <option value="" selected>All</option>
          <option value="true">Favorites</option>
          <option value="false">Non-Favorites</option>
        </select>
      </div>
    </div>
    <div class="controls-right">
      <label for="bulk-input">Add Titles</label>
      <textarea id="bulk-input" placeholder="Title, URL1|URL2, Genre, Origin(K|C|J)"></textarea>
      <button id="bulk-add-btn">Add</button>
    </div>
  </div>
</header>

<div class="main">
  <table id="tracker-table">
    <thead>
      <tr>
        <th>Title</th><th>Links</th><th>Origin</th><th>Genre</th>
        <th>Status</th><th>Last Ep</th><th>Fav</th><th>Del</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
// ================================================================
//  SUPABASE CONFIG
// ================================================================
const SUPABASE_URL = "https://xtcybzastpbornuzvvpk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0Y3liemFzdHBib3JudXp2dnBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NjMwMzAsImV4cCI6MjA4NzQzOTAzMH0.6eDkc8lFt4i48pegRsohi5bLnyGZbnGZwt1hz2xW-gU";

const sb = {
    headers: { "Content-Type":"application/json","apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}` },
    async get(table) {
        const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?order=created_at.asc`,{headers:this.headers});
        if(!r.ok) throw new Error(await r.text()); return r.json();
    },
    async insert(table,obj) {
        const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{method:"POST",headers:{...this.headers,"Prefer":"return=representation"},body:JSON.stringify(obj)});
        if(!r.ok) throw new Error(await r.text()); return (await r.json())[0];
    },
    async update(table,id,obj) {
        const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`,{method:"PATCH",headers:{...this.headers,"Prefer":"return=representation"},body:JSON.stringify(obj)});
        if(!r.ok) throw new Error(await r.text()); return r.json();
    },
    async delete(table,id) {
        const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`,{method:"DELETE",headers:this.headers});
        if(!r.ok) throw new Error(await r.text());
    }
};

function syncStatus(state,msg) {
    const el=document.getElementById('sync-status');
    el.className=state; el.textContent=msg;
    if(state==='ok') setTimeout(()=>{el.className='';el.textContent='☁ Synced';},2000);
}

// ================================================================
//  STATE
// ================================================================
let data = []; // array of manhwa objects from Supabase

async function initData() {
    syncStatus('syncing','⏳ Loading…');
    try {
        data = await sb.get('manhwa');
        localStorage.setItem('manhwa_cache', JSON.stringify(data));
        syncStatus('ok','✓ Synced');
    } catch(e) {
        syncStatus('error','⚠ Offline – using local cache');
        data = JSON.parse(localStorage.getItem('manhwa_cache')||'[]');
    }
    renderTable();
    updateGenreFilter();
}

function cacheLocally() { localStorage.setItem('manhwa_cache', JSON.stringify(data)); }

// ================================================================
//  RENDER TABLE
// ================================================================
function renderTable() {
    const tbody = document.querySelector('#tracker-table tbody');
    tbody.innerHTML = "";

    const sorted = [...data].sort((a,b) => (b.favorite?1:0)-(a.favorite?1:0));

    sorted.forEach(entry => {
        const row = document.createElement('tr');

        // Title
        const titleCell = document.createElement('td');
        titleCell.textContent = entry.title;
        row.appendChild(titleCell);

        // Links
        const linksCell = document.createElement('td');
        (entry.links||[]).forEach((link,i)=>{
            const div=document.createElement('div'); div.className="link-item";
            const a=document.createElement('a'); a.href=link; a.textContent=`Link ${i+1}`; a.target="_blank";
            div.appendChild(a);
            const del=document.createElement('button'); del.textContent="❌";
            del.onclick=()=>{ const links=[...(entry.links||[])]; links.splice(i,1); updateField(entry.id,'links',links); };
            div.appendChild(del); linksCell.appendChild(div);
        });
        const addInput=document.createElement('input'); addInput.placeholder="New URL"; addInput.style.width="80%";
        const addBtn=document.createElement('button'); addBtn.textContent="➕";
        addBtn.onclick=()=>{ const u=addInput.value.trim(); if(u){ const links=[...(entry.links||[]),u]; updateField(entry.id,'links',links); } };
        const addRow=document.createElement('div'); addRow.className="link-item"; addRow.appendChild(addInput); addRow.appendChild(addBtn);
        linksCell.appendChild(addRow); row.appendChild(linksCell);

        // Origin
        const originCell=document.createElement('td');
        const originSelect=document.createElement('select');
        originSelect.innerHTML=`<option value="">U</option><option value="K">K</option><option value="C">C</option><option value="J">J</option>`;
        originSelect.value=entry.origin||"";
        originSelect.addEventListener('change',()=>updateField(entry.id,'origin',originSelect.value,false));
        originCell.appendChild(originSelect); row.appendChild(originCell);

        // Genre — save on blur (when you leave the field), not while typing
        const genreCell=document.createElement('td');
        const genreInput=document.createElement('input'); genreInput.type="text"; genreInput.setAttribute('list','genre-suggestions'); genreInput.value=entry.genre||"";
        genreInput.addEventListener('blur',()=>{ updateField(entry.id,'genre',genreInput.value,false); updateGenreFilter(); });
        genreCell.appendChild(genreInput); row.appendChild(genreCell);

        // Status
        const statusCell=document.createElement('td');
        const statusSelect=document.createElement('select');
        ["Ongoing","Completed","Hiatus","Plan to Read"].forEach(opt=>{ const o=document.createElement('option'); o.value=opt; o.textContent=opt; if(entry.status===opt) o.selected=true; statusSelect.appendChild(o); });
        statusSelect.addEventListener('change',()=>updateField(entry.id,'status',statusSelect.value,false));
        statusCell.appendChild(statusSelect); row.appendChild(statusCell);

        // Last Episode — save on blur
        const epCell=document.createElement('td');
        const epInput=document.createElement('input'); epInput.type="number"; epInput.value=entry.last_episode||0;
        epInput.addEventListener('blur',()=>updateField(entry.id,'last_episode',parseInt(epInput.value)||0,false));
        epCell.appendChild(epInput); row.appendChild(epCell);

        // Favorite
        const favCell=document.createElement('td');
        const favInput=document.createElement('input'); favInput.type="checkbox"; favInput.checked=entry.favorite||false; favInput.className="fav-checkbox";
        favInput.addEventListener('change',()=>updateField(entry.id,'favorite',favInput.checked,true));
        favCell.appendChild(favInput); row.appendChild(favCell);

        // Delete
        const delCell=document.createElement('td');
        const delBtn=document.createElement('button'); delBtn.textContent="❌";
        delBtn.onclick=async ()=>{
            data=data.filter(x=>x.id!==entry.id); cacheLocally(); renderTable(); updateGenreFilter();
            try { await sb.delete('manhwa',entry.id); } catch(e){ syncStatus('error','⚠ Sync failed'); }
        };
        delCell.appendChild(delBtn); row.appendChild(delCell);

        tbody.appendChild(row);
    });

    applyFilters();
}

// ================================================================
//  FIELD UPDATE
// ================================================================
async function updateField(id, field, value, rerender=false) {
    const entry = data.find(x=>x.id===id); if(!entry) return;
    entry[field] = value;
    cacheLocally();
    if(rerender) renderTable();
    try { await sb.update('manhwa', id, { [field]: value }); }
    catch(e) { syncStatus('error','⚠ Sync failed'); }
}

// ================================================================
//  GENRE FILTER
// ================================================================
function updateGenreFilter() {
    const genres=new Set();
    data.forEach(e=>{ (e.genre||"").split(',').forEach(g=>{ const t=g.trim(); if(t) genres.add(t); }); });

    const container=document.getElementById('genre-checkboxes');
    const prevChecked=new Set(Array.from(container.querySelectorAll('input:checked')).map(x=>x.value));
    container.innerHTML='';
    Array.from(genres).sort().forEach(g=>{
        const label=document.createElement('label'); label.style="font-size:12px;display:flex;align-items:center;gap:5px;";
        const cb=document.createElement('input'); cb.type='checkbox'; cb.value=g; cb.classList.add('genre-filter-checkbox');
        if(prevChecked.has(g)) cb.checked=true;
        cb.addEventListener('change',applyFilters); label.appendChild(cb); label.appendChild(document.createTextNode(g)); container.appendChild(label);
    });

    const datalist=document.getElementById("genre-suggestions"); datalist.innerHTML='';
    Array.from(genres).sort().forEach(genre=>{ const o=document.createElement('option'); o.value=genre; datalist.appendChild(o); });
}

// ================================================================
//  BULK ADD
// ================================================================
document.getElementById('bulk-add-btn').addEventListener('click', async ()=>{
    const input=document.getElementById('bulk-input').value.trim(); if(!input) return;
    const lines=input.split('\n');
    syncStatus('syncing','⏳ Adding…');
    for(const line of lines){
        const parts=line.split(',').map(x=>x.trim());
        const title=parts[0], linksRaw=parts[1], genre=parts[2]||"Unknown", origin=parts[3]||"";
        if(title&&linksRaw){
            const links=linksRaw.split('|').map(l=>l.trim());
            try {
                const created=await sb.insert('manhwa',{title,links,genre,origin,status:"Plan to Read",last_episode:0,favorite:false});
                data.push(created);
            } catch(e){ syncStatus('error','⚠ Add failed'); }
        }
    }
    cacheLocally(); document.getElementById('bulk-input').value='';
    syncStatus('ok','✓ Saved'); renderTable(); updateGenreFilter();
});

// ================================================================
//  FILTERS
// ================================================================
function applyFilters() {
    const search=document.getElementById('search-bar').value.toLowerCase();
    const status=document.getElementById('status-filter').value.toLowerCase();
    const favorite=document.getElementById('favorites-filter').value;
    const selectedGenres=Array.from(document.querySelectorAll('.genre-filter-checkbox:checked')).map(cb=>cb.value.toLowerCase());
    const matchAll=document.getElementById('genre-toggle').checked;
    const selectedOrigins=Array.from(document.querySelectorAll('.origin-filter-checkbox:checked')).map(cb=>cb.value);

    document.querySelectorAll('#tracker-table tbody tr').forEach(row=>{
        const [titleCell,,originCell,genreCell,statusCell,,favCell]=row.children;
        const title=titleCell.textContent.toLowerCase();
        const genreList=(genreCell.querySelector('input').value||"").toLowerCase().split(',').map(g=>g.trim()).filter(g=>g);
        const oVal=originCell.querySelector('select').value;
        const sVal=statusCell.querySelector('select').value.toLowerCase();
        const fVal=favCell.querySelector('input').checked;

        let visible=true;
        if(search&&!title.includes(search)) visible=false;
        if(status&&status!==sVal) visible=false;
        if(favorite!==""&&((favorite==="true")!==fVal)) visible=false;
        if(selectedOrigins.length&&!selectedOrigins.includes(oVal)) visible=false;
        if(selectedGenres.length){ const matched=matchAll?selectedGenres.every(g=>genreList.includes(g)):selectedGenres.some(g=>genreList.includes(g)); if(!matched) visible=false; }
        row.style.display=visible?"":"none";
    });
}

document.getElementById('search-bar').addEventListener('input',applyFilters);
document.getElementById('genre-toggle').addEventListener('change',applyFilters);
document.getElementById('status-filter').addEventListener('change',applyFilters);
document.getElementById('favorites-filter').addEventListener('change',applyFilters);
document.querySelectorAll('.origin-filter-checkbox').forEach(cb=>cb.addEventListener('change',applyFilters));

document.getElementById('reset-filters').addEventListener('click',()=>{
    document.getElementById('search-bar').value=""; document.getElementById('status-filter').value=""; document.getElementById('favorites-filter').value=""; document.getElementById('genre-toggle').checked=false;
    document.querySelectorAll('.genre-filter-checkbox,.origin-filter-checkbox').forEach(cb=>cb.checked=false);
    applyFilters();
});

// ================================================================
//  BACKUP / RESTORE
// ================================================================
document.getElementById('backup-btn').addEventListener('click',()=>{
    const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));
    a.download=`manhwa_backup_${new Date().toISOString().split('T')[0]}.json`; a.click();
});
document.getElementById('restore-btn').addEventListener('click',()=>document.getElementById('restore-file').click());
document.getElementById('restore-file').addEventListener('change',async function(){
    const file=this.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=async function(e){
        try {
            const imported=JSON.parse(e.target.result);
            if(!confirm("This will overwrite all cloud data. Continue?")) return;
            syncStatus('syncing','⏳ Restoring…');
            for(const d of data) await sb.delete('manhwa',d.id).catch(()=>{});
            data=[];
            for(const entry of imported){
                const created=await sb.insert('manhwa',{title:entry.title,links:entry.links||[],genre:entry.genre||"",origin:entry.origin||"",status:entry.status||"Plan to Read",last_episode:entry.last_episode||entry.lastEpisode||0,favorite:entry.favorite||false});
                data.push(created);
            }
            cacheLocally(); syncStatus('ok','✓ Restored'); renderTable(); updateGenreFilter();
        } catch(err){ syncStatus('error','⚠ Restore failed: '+err.message); }
    };
    reader.readAsText(file);
});

// ================================================================
//  INIT
// ================================================================
initData();

// ================================================================
//  LOCK SCREEN
// ================================================================
(function() {
    const CORRECT = "YOURPASSWORD";
    const SESSION_KEY = "mt_auth";
    if (sessionStorage.getItem(SESSION_KEY) === "1") {
        document.getElementById('lock-screen').classList.add('hidden');
        document.getElementById('app').style.display = 'block';
    }
    window.unlock = function() {
        const val = document.getElementById('lock-pwd').value;
        if (val === CORRECT) {
            sessionStorage.setItem(SESSION_KEY, "1");
            document.getElementById('lock-screen').classList.add('hidden');
            document.getElementById('app').style.display = 'block';
        } else {
            const err = document.getElementById('lock-error');
            err.textContent = "❌ Incorrect password.";
            document.getElementById('lock-pwd').value = '';
            document.getElementById('lock-pwd').focus();
            setTimeout(() => err.textContent = '', 2000);
        }
    };
})();
</script>
</div><!-- end #app -->
</body>
</html>
